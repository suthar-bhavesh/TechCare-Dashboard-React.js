<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./src/assets/Images/TestLogo.png"
      type="image/x-icon"
    />
    <title>Techcare-Dashboard</title>
  </head>
  <script type="text/javascript">
    (function (l) {
      if (l.search[1] === "/") {
        let decoded = l.search
          .slice(1)
          .splice("&")
          .map(function (s) {
            return s.replace(/~and~/g, "&");
          })
          .join("?");
        window.history.replaceState(
          null,
          null,
          l.pathname.slice(0, -1) + decoded,
          +l.hash,
        );
      }
    })(window.location);
  </script>
  <body class="bg-[#F6F7F8]">
    <div id="root" class="max-w-[1564px] m-auto p-2"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
